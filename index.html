<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M Language — Simplicidade por Definição</title>
    <link rel="icon" type="image/png" href="mlogo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root { --paper: #faf9f6; --ink: #1a1a1a; }
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: var(--paper); color: var(--ink); }
        .container { max-width: 800px; margin: 0 auto; padding: 80px 20px; text-align: center; }
        .main-logo { max-width: 100px; margin-bottom: 20px; }
        h1 { font-family: 'Courier Prime', monospace; font-size: 3.5em; margin: 0; text-transform: uppercase; letter-spacing: -2px; }
        
        #random-slogan { font-family: 'Courier Prime', monospace; font-size: 1em; letter-spacing: 1px; text-transform: uppercase; color: #777; height: 20px; margin-bottom: 30px; display: block; font-weight: bold; }
        
        .cta-box { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; margin-top: 50px; margin-bottom: 60px; }
        .btn { font-family: 'Courier Prime', monospace; text-decoration: none; padding: 15px 30px; border: 2px solid var(--ink); color: var(--ink); font-weight: bold; transition: all 0.2s; }
        .btn:hover { background-color: var(--ink); color: #fff; }
        .btn-main { background-color: var(--ink); color: #fff; }
        
        .preview { text-align: left; background-color: #fff; border: 1px solid #ccc; padding: 30px; box-shadow: 10px 10px 0px #eee; margin-bottom: 60px; }
        .preview h3 { font-family: 'Courier Prime', monospace; margin-top: 0; font-size: 1.2em; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        pre { font-family: 'Courier Prime', monospace; line-height: 1.5; margin: 0; font-size: 1em; }
        
        .footer { padding: 60px 40px; border-top: 1px solid #ccc; font-family: 'Courier Prime', monospace; font-size: 0.85em; color: #888; text-align: center; }
        .footer a { color: #000; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <!-- Onde as frases aparecerão -->
    <span id="random-slogan">...</span>

    <img src="mlogo.png" alt="M Logo" class="main-logo">
    <h1>M Language</h1>
    <p class="tagline">"Código que parece pensamento."</p>
    
    <div class="cta-box">
        <a href="download.html" class="btn btn-main">Obter a M</a>
        <a href="commands.html" class="btn">Guia de Comandos</a>
        <a href="documentation.html" class="btn">Referência Técnica</a>
    </div>

    <div class="preview">
        <h3 id="code-title">Exemplo de Código</h3>
        <pre><code id="random-code">...</code></pre>
    </div>
</div>

<footer class="footer">
    <p>Projeto M — Desenvolvido por João | Entenda o uso da IA. <a href="ai_meta.html">Saiba mais</a></p>
</footer>

<script>
    const slogans = [
        "Built to think, not to struggle", "Simple code. Real ideas", "Write less. Understand more",
        "Code that feels human", "Clarity over complexity", "Made for everyone",
        "If it’s hard to read, it’s not M", "Think it. Write it. Done", "Less syntax. More sense",
        "Programming without the noise", "From idea to code instantly", "Minimal, but powerful",
        "Easy peasy, code squeezy", "No stress, just code", "Keep it simple. Seriously",
        "Code like you speak", "Small language, big ideas", "Zero drama programming",
        "M — where ideas feel at home", "EU TE AMO MAYSA"
    ];

    const codes = [
        "n = ask \"Identifique-se:\"\nif size n > 0:\n    \"Saudações, \" + n\nend",
        "count = 1\nwhile count <= 5:\n    \"Contagem: \" + count\n    count = count + 1\nend",
        "users = []\nadd \"Maysa\" to users\n\"Total: \" + size users",
        "func hello:\n    \"Olá mundo na linguagem M\"\nend\nhello",
        "user = { name = \"João\" }\n\"Usuário: \" + user.name"
    ];

    function randomize() {
        document.getElementById('random-slogan').innerText = slogans[Math.floor(Math.random() * slogans.length)];
        document.getElementById('random-code').innerText = codes[Math.floor(Math.random() * codes.length)];
    }

    randomize();
</script>
</body>
</html>
